name: CI

on:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: actions/cache@v4
        id: npm-cache
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - run: npm ci
        if: steps.npm-cache.outputs.cache-hit != 'true'
      - uses: actions/cache@v4
        with:
          path: ~/.cache/spago
          key: spago-${{ hashFiles('spago.lock') }}
      - run: npm run ps-install
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: actions/cache@v4
        id: npm-cache
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - run: npm ci
        if: steps.npm-cache.outputs.cache-hit != 'true'
      - run: npm run format:check

  unit:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: actions/cache@v4
        id: npm-cache
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - run: npm ci
        if: steps.npm-cache.outputs.cache-hit != 'true'
      - uses: actions/cache@v4
        with:
          path: ~/.cache/spago
          key: spago-${{ hashFiles('spago.lock') }}
      - run: npm run ps-install
      - run: npm run test

  bundle:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Bundle size check
        run: |
          total=$(find dist -name "*.js" -exec wc -c {} + | tail -1 | awk '{print $1}')
          limit=614400
          echo "Total JS: ${total} bytes / ${limit} byte limit"
          if [ "$total" -gt "$limit" ]; then
            echo "FAIL: JS bundle size exceeded"
            exit 1
          fi

  smoke:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: actions/cache@v4
        id: npm-cache
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - run: npm ci
        if: steps.npm-cache.outputs.cache-hit != 'true'
      - uses: actions/cache@v4
        id: puppeteer-cache
        with:
          path: ~/.cache/puppeteer
          key: puppeteer-${{ hashFiles('package-lock.json') }}
      - run: npx puppeteer browsers install chrome
        if: steps.puppeteer-cache.outputs.cache-hit != 'true'
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Start server
        run: npx serve dist -p 1234 &
      - name: Wait for server
        run: until curl -s http://localhost:1234 > /dev/null; do sleep 1; done
      - name: Smoke test
        run: node test/e2e/worker_loop.spec.js
